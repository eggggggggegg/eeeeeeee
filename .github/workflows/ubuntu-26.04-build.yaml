name: Build Custom Runner Image

on:
  workflow_dispatch:

jobs:
  build-image:
    name: Create ubuntu-26.04 runner image
    runs-on: ubuntu-24.04

    snapshot:
      image-name: ubuntu-26.04
      version: 1.0.0

    steps:
      - name: Update package lists
        run: sudo apt-get update

      - name: Install common build tools
        run: |
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            git \
            unzip \
            jq

      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com | sudo sh

      - name: Install Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Install Python
        run: |
          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-venv

      - name: Verify tooling
        run: |
          node --version
          npm --version
          python3 --version
          docker --version
